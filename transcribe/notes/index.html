<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Listening Notes — hear it, read it, look words up | AnotherPart</title>
    <meta
      name="description"
      content="A listening helper: it hears speech and writes it down (no auto-translation), replays any line, and gives a dictionary hint when you tap a word. Fully on your device with Whisper. No internet after the first load, no sign-in." />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div class="ap-shell">
      <nav class="ap-nav" data-active="transcriber"></nav>

      <main class="ap-main">
        <div class="ap-stage ap-stage-fill">
          <div class="ap-duplex">
            <div id="engineStatus" class="ap-status-muted ap-duplex-status"></div>

            <div id="stream" class="ap-duplex-stream"></div>

            <div class="ap-duplex-bar">
              <div class="ap-duplex-langs">
                <label class="ap-field-label">Listening
                  <select id="listening" class="ap-select"></select>
                </label>
                <button type="button" id="swap" class="ap-swap-btn"
                  title="Swap languages" aria-label="Swap languages">⇄</button>
                <label class="ap-field-label">Dictionary
                  <select id="dictionary" class="ap-select"></select>
                </label>
              </div>

              <button id="startPause" class="ap-duplex-start" type="button">
                Start
              </button>

              <button id="clearBtn" class="ap-duplex-clear" type="button"
                title="Clear the notes" hidden>🗑</button>

              <button id="saveBtn" class="ap-duplex-clear" type="button"
                title="Save the transcript (text)" hidden>Save</button>

              <label class="ap-duplex-speak"
                title="Use the larger Whisper model (~250 MB, one-time download) — fewer mistakes, a bit slower per phrase">
                <input type="checkbox" id="highAccuracy" />
                <span>high accuracy</span>
              </label>

              <label class="ap-duplex-speak" title="Keep the original recording for replay (uses memory)">
                <input type="checkbox" id="keepAudio" />
                <span>original audio</span>
              </label>
            </div>
          </div>
        </div>

        <div class="ap-footer">
          listening notes — it writes down what it hears, no auto-translation ·
          tap a word for a dictionary hint · Whisper and Vosk run on your
          device; the Chrome streaming option is online ·
          <a href="/transcribe/">back</a>
        </div>
      </main>

      <aside class="ap-ads">
        <div class="ap-ad-slot">ad</div>
      </aside>
    </div>

    <script type="module" src="/src/nav.ts"></script>
    <script type="module" src="/src/notes.ts"></script>
  </body>
</html>
