<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Turn Translator (offline) — on-device, private | AnotherPart</title>
    <meta
      name="description"
      content="Put the phone on the table between you. Each person has their own button: tap it, speak, it translates live — fully on your device. Whisper speech + Marian translation, no internet after the first load, no sign-in." />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body data-pair="offline">
    <div class="ap-shell">
      <nav class="ap-nav" data-active="translators"></nav>

      <main class="ap-main">
        <div class="ap-stage ap-stage-fill">
          <div class="ap-turn">
            <!-- ROW 1 (top, grows, scrolls): status + live zone. -->
            <div class="ap-turn-top">
              <div id="engineStatus" class="ap-status-muted"
                style="text-align: center"></div>

              <!-- The current turn, segment by segment (original /
                   translation pairs). Tap a chunk to hear it. -->
              <div id="live" class="ap-turn-live-zone"></div>
            </div>

            <!-- ROW 2 (dead-center, immovable): two buttons; the
                 language lives IN the button (a ▾ in the corner),
                 the body starts/stops. -->
            <div class="ap-turn-mid">
              <div class="ap-turn-buttons">
                <div id="btnA" class="ap-turn-side" data-side="a">
                  <select id="langA" class="ap-turn-lang"></select>
                  <span class="ap-turn-side-label"></span>
                </div>
                <div id="btnB" class="ap-turn-side" data-side="b">
                  <select id="langB" class="ap-turn-lang"></select>
                  <span class="ap-turn-side-label"></span>
                </div>
              </div>

              <label class="ap-turn-speak">
                <input type="checkbox" id="autoSpeak" />
                speak the translation aloud automatically
              </label>
            </div>

            <!-- ROW 3 (bottom, grows, scrolls): the archive. -->
            <div id="archive" class="ap-turn-archive"></div>
          </div>
        </div>

        <div class="ap-footer">
          offline translator — speech and text NEVER leave your device ·
          models download once, then works with no internet · free, no sign-in ·
          <a href="/translate/">other translators</a>
        </div>
      </main>

      <aside class="ap-ads">
        <div class="ap-ad-slot">ad</div>
      </aside>
    </div>

    <script type="module" src="/src/nav.ts"></script>
    <script type="module" src="/src/turn.ts"></script>
  </body>
</html>
